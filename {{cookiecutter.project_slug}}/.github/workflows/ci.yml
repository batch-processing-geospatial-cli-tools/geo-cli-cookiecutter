name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # Applies to every uv command below, including `uv run`, which re-syncs the
      # environment and would otherwise fall back to the default interpreter.
      UV_PYTHON: {% raw %}${{ matrix.python-version }}{% endraw %}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python {% raw %}${{ matrix.python-version }}{% endraw %}
        run: uv python install {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Install the project
        run: uv sync --all-extras

      - name: Lint
        run: uv run --all-extras ruff check .

      - name: Check formatting
        run: uv run --all-extras ruff format --check .

      - name: Type check
        run: uv run --all-extras mypy

      - name: Test
        run: uv run --all-extras pytest --cov --cov-report=term-missing
