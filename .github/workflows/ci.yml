name: CI

on:
  push:
    branches: [main, build]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # Every uv command in this job — including `uv run`, which re-syncs the
      # environment — must target the matrix interpreter, not the pinned default.
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install the template's own tooling
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      # Runs the slow test too: it bakes a project, installs it into its own
      # virtualenv, and runs the generated suite, ruff, mypy and console script.
      - name: Test
        run: uv run pytest -v
